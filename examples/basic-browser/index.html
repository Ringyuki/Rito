<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rito — Basic Browser Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        gap: 16px;
      }
      h1 {
        font-size: 1.25rem;
        color: #333;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
      }
      button:hover {
        background: #eee;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        font-size: 0.875rem;
        color: #666;
      }
      .main-area {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      #toc-panel {
        width: 220px;
        max-height: 720px;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.8125rem;
        display: none;
      }
      #toc-panel.visible {
        display: block;
      }
      #toc-panel h2 {
        font-size: 0.875rem;
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
        color: #333;
      }
      #toc-list {
        list-style: none;
        padding: 4px 0;
      }
      #toc-list li {
        padding: 4px 12px;
        cursor: pointer;
        color: #555;
      }
      #toc-list li:hover {
        background: #f5f5f5;
        color: #000;
      }
      #toc-list li.active {
        background: #e8f0fe;
        color: #1a73e8;
      }
      canvas {
        border: 1px solid #ccc;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        outline: none;
      }
    </style>
  </head>
  <body>
    <h1>Rito — EPUB Renderer</h1>

    <div class="controls">
      <button id="load-demo">Load Demo EPUB</button>
      <label>
        or choose a file:
        <input type="file" id="file-input" accept=".epub" />
      </label>
    </div>

    <div class="controls">
      <button id="prev" disabled>&larr; Prev</button>
      <span id="status">No document loaded</span>
      <button id="next" disabled>Next &rarr;</button>
      <button id="spread-toggle">Spread: Double</button>
      <button id="toc-toggle" disabled>TOC</button>
    </div>

    <div class="main-area">
      <nav id="toc-panel">
        <h2>Table of Contents</h2>
        <ul id="toc-list"></ul>
      </nav>
      <canvas id="canvas" tabindex="0" />
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
