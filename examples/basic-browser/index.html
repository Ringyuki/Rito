<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rito — Basic Browser Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        gap: 16px;
      }
      h1 {
        font-size: 1.25rem;
        color: #333;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
      }
      button:hover {
        background: #eee;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        font-size: 0.875rem;
        color: #666;
      }
      canvas {
        border: 1px solid #ccc;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <h1>Rito — EPUB Renderer</h1>

    <div class="controls">
      <button id="load-demo">Load Demo EPUB</button>
      <label>
        or choose a file:
        <input type="file" id="file-input" accept=".epub" />
      </label>
    </div>

    <div class="controls">
      <button id="prev" disabled>← Prev</button>
      <span id="status">No document loaded</span>
      <button id="next" disabled>Next →</button>
      <button id="spread-toggle">Spread: Double</button>
    </div>

    <canvas id="canvas" />

    <script type="module" src="./main.ts"></script>
  </body>
</html>
